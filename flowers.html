<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers for You</title>
    <style>
    body, html { 
        margin: 0; padding: 0; 
        height: 100%; width: 100%; 
        overflow: hidden; 
        background-color: #1a1a1a; /* Dark background so it looks seamless */
        display: flex; 
        justify-content: center; 
        align-items: center; 
    }
    .bg { 
        position: relative; 
        width: 100vw; 
        height: 100vh; 
        /* CHANGE THIS: use 'contain' so nothing is cut off */
        background-image: url('41482.png'); 
        background-size: contain; 
        background-position: center; 
        background-repeat: no-repeat; 
    }
    .back { 
        position: absolute; 
        top: 20px; 
        left: 20px; 
        color: white; 
        text-decoration: none; 
        font-family: sans-serif; 
        background: rgba(255,255,255,0.2); 
        padding: 10px 20px; 
        border-radius: 30px; 
        border: 1px solid rgba(255,255,255,0.3); 
        z-index: 10; 
    }
</style>
</head>
<body>
    <div class="bg"><a href="gift.html" class="back">← Back</a></div>
<audio id="bgMusic" loop>
    <source src="background.mp3" type="audio/mpeg">
</audio>

<script>
    const bgMusic = document.getElementById('bgMusic');

    // 1. Setup on Page Load
    window.addEventListener('load', () => {
        const savedTime = localStorage.getItem('bgMusicTime');
        const isPlaying = localStorage.getItem('bgMusicPlaying');

        // Restore the exact second where the song left off
        if (savedTime) {
            bgMusic.currentTime = parseFloat(savedTime);
        }

        // Try to play automatically if it was already playing on the previous screen
        if (isPlaying === 'true') {
            bgMusic.play().catch(() => {
                console.log("Waiting for user tap to resume background music.");
            });
        }

        // Essential: First tap on any screen starts/resumes the loop
        document.body.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play();
                localStorage.setItem('bgMusicPlaying', 'true');
            }
        }, { once: true });
    });

    // 2. Continuous Sync (Saves the time every 100ms)
    setInterval(() => {
        if (!bgMusic.paused) {
            localStorage.setItem('bgMusicTime', bgMusic.currentTime);
        }
    }, 100);

    // 3. Stop background music if moving to the main "Night Changes" screen
    document.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            if (link.getAttribute('href') === 'music.html') {
                bgMusic.pause();
                localStorage.setItem('bgMusicPlaying', 'false');
            }
        });
    });
        </script>
</body>
</html>
