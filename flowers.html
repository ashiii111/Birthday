<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowers for You</title>
    <style>
    body, html { 
        margin: 0; padding: 0; 
        height: 100%; width: 100%; 
        overflow: hidden; 
        background-color: #1a1a1a; /* Dark background so it looks seamless */
        display: flex; 
        justify-content: center; 
        align-items: center; 
    }
    .bg { 
        position: relative; 
        width: 100vw; 
        height: 100vh; 
        /* CHANGE THIS: use 'contain' so nothing is cut off */
        background-image: url('41482.gif'); 
        background-size: contain; 
        background-position: center; 
        background-repeat: no-repeat; 
    }
    .back { 
        position: absolute; 
        top: 20px; 
        left: 20px; 
        color: white; 
        text-decoration: none; 
        font-family: sans-serif; 
        background: rgba(255,255,255,0.2); 
        padding: 10px 20px; 
        border-radius: 30px; 
        border: 1px solid rgba(255,255,255,0.3); 
        z-index: 10; 
    }
</style>
</head>
<body>
    <div class="bg"><a href="gift.html" class="back">← Back</a></div>
</body>
</html>
