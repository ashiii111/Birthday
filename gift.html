<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Gift Box</title>
    <style>
        /* Add this to the top of your CSS in both files */
* {
    -webkit-tap-highlight-color: transparent; /* Removes the blue flash */
    -webkit-touch-callout: none;              /* Prevents the 'save image' menu on long press */
    outline: none;                            /* Removes the focus border */
}

/* Ensure your invisible button has these specifically */
.invisible-btn {
    background: transparent;
    border: none;
    -webkit-tap-highlight-color: rgba(0,0,0,0); /* Extra backup for older phones */
}
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #000; }
        .bg { 
            position: relative; width: 100vw; height: 100vh; 
            background-image: url('41483.jpg'); 
            background-size: contain; background-position: center; background-repeat: no-repeat; 
        }
        .back { position: absolute; top: 20px; left: 20px; color: white; text-decoration: none; font-family: sans-serif; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.3); z-index: 10; }
        .gift-hotspot { position: absolute; cursor: pointer; background: rgba(255, 255, 255, 0); }
        .btn-chocolate { top: 50%; left: 46%; width: 10%; height: 8%; }
        .btn-flowers { top: 52%; left: 55%; width: 19%; height: 8%; }
        .btn-letter { top: 45%; left: 57%; width: 17%; height: 6%; }
    </style>
</head>
<body>
    <div class="bg">
        <a href="index.html" class="back">← Back</a>
        <a href="chocolate.html" class="gift-hotspot btn-chocolate"></a>
        <a href="flowers.html" class="gift-hotspot btn-flowers"></a>
        <a href="letter.html" class="gift-hotspot btn-letter"></a>
    </div>
<audio id="bgMusic" loop>
    <source src="background.mp3" type="audio/mpeg">
</audio>

<script>
    const bgMusic = document.getElementById('bgMusic');

    // 1. Setup on Page Load
    window.addEventListener('load', () => {
        const savedTime = localStorage.getItem('bgMusicTime');
        const isPlaying = localStorage.getItem('bgMusicPlaying');

        // Restore the exact second where the song left off
        if (savedTime) {
            bgMusic.currentTime = parseFloat(savedTime);
        }

        // Try to play automatically if it was already playing on the previous screen
        if (isPlaying === 'true') {
            bgMusic.play().catch(() => {
                console.log("Waiting for user tap to resume background music.");
            });
        }

        // Essential: First tap on any screen starts/resumes the loop
        document.body.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play();
                localStorage.setItem('bgMusicPlaying', 'true');
            }
        }, { once: true });
    });

    // 2. Continuous Sync (Saves the time every 100ms)
    setInterval(() => {
        if (!bgMusic.paused) {
            localStorage.setItem('bgMusicTime', bgMusic.currentTime);
        }
    }, 100);

    // 3. Stop background music if moving to the main "Night Changes" screen
    document.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            if (link.getAttribute('href') === 'music.html') {
                bgMusic.pause();
                localStorage.setItem('bgMusicPlaying', 'false');
            }
        });
    });
</script>
</body>
</html>
