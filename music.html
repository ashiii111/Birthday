<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('41486.gif'); /* Your vinyl image */
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

/* Update these specific sections in your music.html */

.lyrics-box {
    position: absolute;
    /* We use 'top: 50%' and 'transform' to keep it perfectly centered vertically */
    top: 50%;
    left: 65%; 
    width: 30%;
    height: 40%;
    transform: translateY(-50%); 
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 10;
    /* REMOVE the line below once the lyrics are positioned correctly */
    border: 2px solid red; 
}

.lyric-line {
    font-family: 'Georgia', serif;
    font-size: 1.2rem; /* Made slightly smaller to fit the drawing area */
    font-style: italic;
    color: #000; /* Changed to Black so it's visible on the gray background */
    position: absolute;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
    width: 100%;
    margin: 0;
}


        /* This class makes the line visible */
        /* This class must match the name used in your JavaScript */
.lyric-line.active-lyric {
    opacity: 1;
    font-weight: bold;
    color: #000;
}
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            color: white; text-decoration: none; font-family: sans-serif;
            background: rgba(0,0,0,0.5); padding: 10px 20px;
            border-radius: 30px; z-index: 100;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back</a>

    <div class="container">
        <div class="lyrics-box" id="lyrics-display">
            <p class="lyric-line" data-time="9">doesn't like that kind of dress</p>
            <p class="lyric-line" data-time="13">Everything she never had</p>
            <p class="lyric-line" data-time="17">she's showing off</p>
            <p class="lyric-line" data-time="22">Driving too fast, moon is breaking</p>
        </div>
    </div>

    <audio id="mySong">
        <source src="changes.mp3" type="audio/mpeg">
    </audio>

    <script>
        const song = document.getElementById('mySong');
        const lines = document.querySelectorAll('.lyric-line');

        // Note: Music only plays after user clicks the CD in index.html
        window.addEventListener('load', () => {
            song.play().catch(() => {
                console.log("Waiting for user interaction to play music");
            });
        });

        song.ontimeupdate = () => {
            let currentTime = song.currentTime;
            
            lines.forEach((line, index) => {
                let startTime = parseFloat(line.getAttribute('data-time'));
                // Get the time of the NEXT line to know when to fade out
                let nextTime = lines[index + 1] ? parseFloat(lines[index+1].getAttribute('data-time')) : 999;

                if (currentTime >= startTime && currentTime < nextTime) {
                    line.classList.add('active');
                } else {
                    line.classList.remove('active');
                }
            });
        };
    </script>

</body>
</html>
    <audio id="mySong" autoplay>
    <source src="changes.mp3" type="audio/mpeg">
</audio>

<script>
    const song = document.getElementById('mySong');
    const lines = document.querySelectorAll('.lyric-line');

    song.ontimeupdate = () => {
        let currentTime = song.currentTime;
        
        lines.forEach((line, index) => {
            let startTime = parseFloat(line.getAttribute('data-time'));
            let nextTime = lines[index + 1] ? parseFloat(lines[index+1].getAttribute('data-time')) : 999;

            if (currentTime >= startTime && currentTime < nextTime) {
                // Use 'active-lyric' to match the new CSS
                line.classList.add('active-lyric');
            } else {
                line.classList.remove('active-lyric');
            }
        });
    };
</script>
</body>
</html>
