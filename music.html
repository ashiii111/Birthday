<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #000; 
            display: flex; justify-content: center; align-items: center;
        }

        .image-screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('41486.gif'); 
            background-repeat: no-repeat; 
            background-position: center; 
            background-size: contain; 
            cursor: pointer; /* Shows the user they can click here */
        }

        .back-btn {
            position: absolute; top: 20px; left: 20px;
            color: white; text-decoration: none; font-family: sans-serif;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px; border-radius: 30px; z-index: 10;
        }

        /* Instruction text that fades out once music starts */
        .instruction {
            position: absolute; bottom: 50px; width: 100%;
            text-align: center; color: rgba(255,255,255,0.6);
            font-family: sans-serif; font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body onclick="playSong()">

    <a href="index.html" class="back-btn">← Back</a>

    <div class="image-screen">
        <div class="instruction" id="hint">Tap anywhere to play music</div>
    </div>

    <audio id="mySong">
        <source src="night-changes.mp3" type="audio/mpeg">
    </audio>

    <script>
        function playSong() {
            var song = document.getElementById("mySong");
            var hint = document.getElementById("hint");
            
            // Starts the song
            song.play();
            
            // Hides the "Tap to play" text once it's playing
            hint.style.display = "none";
        }
    </script>

</body>
</html>
