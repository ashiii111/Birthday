<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Test</title>
    <style>
        /* This makes the whole screen black */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* This creates the container for your image */
        .image-screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            
            /* MATCH THIS NAME TO YOUR GITHUB FILE */
            background-image: url('41486.gif'); 
            
            /* THIS PREVENTS THE REPEATING ON SIDES */
            background-repeat: no-repeat; 
            
            /* THIS KEEPS IT IN THE CENTER */
            background-position: center; 
            
            /* THIS MAKES IT FIT THE SCREEN SHAPE */
            background-size: contain; 
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-family: sans-serif;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back</a>

    <div class="image-screen"></div>

</body>
</html>
