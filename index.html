<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
        }

        .container {
            position: relative; 
            width: 100vw; 
            height: 100vh;
            background-image: url('41480.png'); 
            background-size: contain; 
            background-position: center; 
            background-repeat: no-repeat;
        }

        .hotspot {
            position: absolute; 
            display: block; 
            cursor: pointer;
            text-decoration: none;
            /* TESTING TIP: Change '0' to '0.3' below to see the red boxes 
               and make sure they align perfectly on your screen! */
            background: rgba(255, 0, 0, 0); 
            border-radius: 10px;
        }

        /* FIXED COORDINATES */
        
        /* Teddy: Shifted Right & made more square */
        .btn-teddy { 
            top: 20%; 
            left: 50%; 
            width: 24%; 
            height: 10%; 
        }

        /* Cake: Shifted Right & shortened height */
        .btn-cake { 
            top: 55%; 
            left: 38%; 
            width: 14%; 
            height: 25%; 
        }

        /* Gift Box: Shifted Right & made wider */
        .btn-gift { 
            top: 52%; 
            left: 58%; 
            width: 18%; 
            height: 30%; 
        }

        /* Vinyl: Shifted Right & lowered slightly */
        .btn-vinyl { 
            top: 8%; 
            left: 75%; 
            width: 15%; 
            height: 25%; 
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="teddy.html" class="hotspot btn-teddy" title="Teddy Bear"></a>
        <a href="cake.html" class="hotspot btn-cake" title="Birthday Cake"></a>
        <a href="gift.html" class="hotspot btn-gift" title="Open Gift"></a>
        <a href="music.html" class="hotspot btn-vinyl" title="Play Music"></a>
    </div>

</body>
</html>
