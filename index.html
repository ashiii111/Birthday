<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <style>
        /* Add this to the top of your CSS in both files */
* {
    -webkit-tap-highlight-color: transparent; /* Removes the blue flash */
    -webkit-touch-callout: none;              /* Prevents the 'save image' menu on long press */
    outline: none;                            /* Removes the focus border */
}

/* Ensure your invisible button has these specifically */
.invisible-btn {
    background: transparent;
    border: none;
    -webkit-tap-highlight-color: rgba(0,0,0,0); /* Extra backup for older phones */
}
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: #1a1a1a;
            display: flex; justify-content: center; align-items: center;
        }

        .container {
            position: relative; 
            width: 100vw; 
            height: 100vh;
            background-image: url('41480.png'); 
            background-size: contain; 
            background-position: center; 
            background-repeat: no-repeat;
        }

        .hotspot {
            position: absolute; 
            display: block; 
            cursor: pointer;
            text-decoration: none;
            /* TESTING TIP: Change '0' to '0.3' below to see the red boxes 
               and make sure they align perfectly on your screen! */
            background: rgba(255, 0, 0, 0); 
            border-radius: 10px;
        }

        /* FIXED COORDINATES */
        
        /* Teddy: Shifted Right & made more square */
        .btn-teddy { 
            top: 40%; 
            left: 48%; 
            width: 24%; 
            height: 10%; 
        }

        /* Cake: Shifted Right & shortened height */
        .btn-cake { 
            top: 50%; 
            left: 38%; 
            width: 22%; 
            height: 13%; 
        }

        /* Gift Box: Shifted Right & made wider */
        .btn-gift { 
            top: 50%; 
            left: 67%; 
            width: 29%; 
            height: 15%; 
        }

        /* Vinyl: Shifted Right & lowered slightly */
        .btn-vinyl { 
            top: 32%; 
            left: 66%; 
            width: 60%; 
            height: 18%; 
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="teddy.html" class="hotspot btn-teddy" title="Teddy Bear"></a>
        <a href="cake.html" class="hotspot btn-cake" title="Birthday Cake"></a>
        <a href="gift.html" class="hotspot btn-gift" title="Open Gift"></a>
        <a href="music.html" class="hotspot btn-vinyl" title="Play Music"></a>
    </div>
<audio id="bgMusic" loop>
    <source src="background.mp3" type="audio/mpeg">
</audio>

<script>
    const bgMusic = document.getElementById('bgMusic');

    // 1. Setup on Page Load
    window.addEventListener('load', () => {
        const savedTime = localStorage.getItem('bgMusicTime');
        const isPlaying = localStorage.getItem('bgMusicPlaying');

        // Restore the exact second where the song left off
        if (savedTime) {
            bgMusic.currentTime = parseFloat(savedTime);
        }

        // Try to play automatically if it was already playing on the previous screen
        if (isPlaying === 'true') {
            bgMusic.play().catch(() => {
                console.log("Waiting for user tap to resume background music.");
            });
        }

        // Essential: First tap on any screen starts/resumes the loop
        document.body.addEventListener('click', () => {
            if (bgMusic.paused) {
                bgMusic.play();
                localStorage.setItem('bgMusicPlaying', 'true');
            }
        }, { once: true });
    });

    // 2. Continuous Sync (Saves the time every 100ms)
    setInterval(() => {
        if (!bgMusic.paused) {
            localStorage.setItem('bgMusicTime', bgMusic.currentTime);
        }
    }, 100);

    // 3. Stop background music if moving to the main "Night Changes" screen
    document.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            if (link.getAttribute('href') === 'music.html') {
                bgMusic.pause();
                localStorage.setItem('bgMusicPlaying', 'false');
            }
        });
    });
</script>
</body>
</html>
